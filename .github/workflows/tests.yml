name: Tests

on:
  push:
    branches: ['**']
    tags: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: "0 3 * * 1"

jobs:
  tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (MPI + NetCDF)
        run: |
          sudo apt-get update -qy
          sudo apt-get install -y \
            cmake ninja-build \
            openmpi-bin libopenmpi-dev \
            libnetcdf-dev libpnetcdf-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          # Build mpi4py against the system MPI
          CC=mpicc pip install --no-binary mpi4py mpi4py
          # muGrid is not yet on PyPI with the FFTEngine; build it from source.
          # MPI and NetCDF auto-enable because their dev libraries are present;
          # eigen/pybind11/dlpack are pulled by CMake FetchContent.
          pip install -v "muGrid @ git+https://github.com/muSpectre/muGrid.git"
          # Install this package without re-resolving deps: the git-built muGrid
          # carries a setuptools-scm dev version (< 0.109.0), so a normal install
          # of the `muGrid>=0.109.0` pin would try to pull a release from PyPI and
          # clobber the MPI-enabled build. numpy, mpi4py and muGrid are already
          # present; add the [test] tools explicitly.
          pip install --no-deps -e .
          pip install pytest pytest-cov netCDF4
          pip list

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: python-${{ matrix.python-version }}
          fail_ci_if_error: false

  mpi:
    # Verifies the solver runs under MPI and that a parallel run reproduces the
    # serial result (the Taylor-Green initial condition is deterministic across
    # ranks, unlike the seeded-random turbulence one).
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (MPI + NetCDF)
        run: |
          sudo apt-get update -qy
          sudo apt-get install -y \
            cmake ninja-build \
            openmpi-bin libopenmpi-dev \
            libnetcdf-dev libpnetcdf-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          CC=mpicc pip install --no-binary mpi4py mpi4py
          pip install -v "muGrid @ git+https://github.com/muSpectre/muGrid.git"
          # --no-deps: keep the MPI-enabled git build (its dev version would
          # otherwise fail the muGrid>=0.109.0 pin and be replaced from PyPI).
          pip install --no-deps -e .
          pip install netCDF4

      - name: Serial vs. parallel consistency
        run: |
          python simulate.py -i taylor-green -n 16 16 16 -N 5 \
            --dump-interval 2 --screen-interval 100 -o serial.nc
          mpirun --oversubscribe -np 2 python simulate.py -i taylor-green \
            -n 16 16 16 -N 5 --dump-interval 2 --screen-interval 100 -o parallel.nc
          python - <<'PY'
          import netCDF4, numpy as np
          a = netCDF4.Dataset("serial.nc").variables["velocity"][:]
          b = netCDF4.Dataset("parallel.nc").variables["velocity"][:]
          assert a.shape == b.shape, (a.shape, b.shape)
          np.testing.assert_allclose(a, b, rtol=1e-6, atol=1e-9)
          print(f"serial == parallel on {a.shape[0]} frames (max abs diff "
                f"{np.max(np.abs(a - b)):.2e})")
          PY

  gpu:
    # Runs the device tests (tests/test_gpu.py) on a CUDA runner. muGrid is
    # rebuilt from source with CUDA enabled so its GPU-aware Communicator
    # (the sum/min/max/mean reductions behind `ns.parnp` and `power`) and FFT
    # engine actually execute on the device. The same tests auto-skip in the
    # CPU `tests` job above when no GPU/CuPy is present. GPU runners are scarce,
    # so this job only runs on `main` and tags, mirroring muGrid's GPU CI.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: linux-x86-cuda
    timeout-minutes: 60

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev", "nvrtc-dev"]'
          non-cuda-sub-packages: '["libcufft-dev", "libcublas-dev", "libcurand-dev"]'

      - name: Show GPU info
        run: |
          nvidia-smi
          nvcc --version

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qy
          sudo apt-get install -y cmake ninja-build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest cupy-cuda12x
          # Build muGrid from source WITH CUDA so its GPU-aware Communicator and
          # FFT engine run on the device. scikit-build-core forwards the CMake
          # defines in CMAKE_ARGS. MPI and NetCDF are off for this job.
          CMAKE_ARGS="-DMUGRID_ENABLE_CUDA=ON -DMUGRID_ENABLE_MPI=OFF -DMUGRID_ENABLE_NETCDF=OFF -DCMAKE_CUDA_ARCHITECTURES=75" \
            pip install -v "muGrid @ git+https://github.com/muSpectre/muGrid.git"
          # Install this package without its deps: the GPU test only imports
          # muGrid + numpy + cupy (mpi4py/netCDF4 are not needed here).
          pip install --no-deps -e .
          pip list

      - name: Run GPU tests
        run: |
          pytest tests/test_gpu.py -v -s
